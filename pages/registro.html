<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Registrarse - Retro Style</title>
</head>
<body>
    <header>
        <section class="header-1">
            <div class="logo">
                <a href="../index.html">
                    <img src="../img/impresion-camiseta-original-diseno-ropa-vintage-tipografia-ropa-mezclilla-autentica-grunge_266660-505.jpg" alt="Retro Style">
                </a>
            </div>
            <div class="sociales-header">
                <a href=""><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" stroke-width="1.5" stroke="#151212" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 21l1.65 -3.8a9 9 0 1 1 3.4 2.9l-5.05 .9" /><path d="M9 10a.5 .5 0 0 0 1 0v-1a.5 .5 0 0 0 -1 0v1a5 5 0 0 0 5 5h1a.5 .5 0 0 0 0 -1h-1a.5 .5 0 0 0 0 1" /></svg></a>
                <a href=""><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" stroke-width="1.5" stroke="#151212" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 4m0 4a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4z" /><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" /><path d="M16.5 7.5l0 .01" /></svg></a>
                <a href=""><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" stroke-width="1.5" stroke="#151212" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 10v4h3v7h4v-7h3l1 -4h-4v-2a1 1 0 0 1 1 -1h3v-4h-3a5 5 0 0 0 -5 5v2h-3" /></svg></a>
            </div>
        </section>
    </header>

    <main class="main-login">
        <section class="bg-login">
            <div class="login-side">
                <h3>Crear cuenta</h3>
                <div class="login">
                    <div class="inp-login">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" name="nombre" id="nombre" placeholder="Tu nombre">
                    </div>
                    <div class="inp-login">
                        <label for="usuario">Usuario</label>
                        <input type="text" name="usuario" id="usuario" placeholder="Elige un usuario">
                    </div>
                    <div class="inp-login">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="tu@email.com">
                    </div>
                    <div class="inp-login">
                        <label for="contraseña">Contraseña</label>
                        <input type="password" name="contraseña" id="contraseña" placeholder="Mínimo 4 caracteres">
                    </div>
                    <div class="inp-login">
                        <label for="confirmar">Confirmar contraseña</label>
                        <input type="password" name="confirmar" id="confirmar" placeholder="Repetí la contraseña">
                    </div>
                    <p id="registro-error" class="form-msg form-msg--error" style="display:none;"></p>
                    <p id="registro-success" class="form-msg form-msg--success" style="display:none;"></p>
                    <div class="botones">
                        <a id="btn-registrar" class="boton">Crear cuenta</a>
                    </div>
                    <p class="login-link">¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a></p>
                </div>
            </div>
            <div class="bg-img-login">
                <div class="img-login"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="derechos">
            <p>TODOS LOS DERECHOS RESERVADOS & NICOLAS PERALTA</p>
        </div>
    </footer>

    <script src="../js/pages/registro.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
